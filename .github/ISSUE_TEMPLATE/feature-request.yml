name: Feature Request
description: 提议一个新特性或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交功能请求！请描述你希望解决的问题或改进点。

  - type: textarea
    id: problem
    attributes:
      label: 问题描述
      description: 描述你遇到的问题或痛点
      placeholder: 我发现每次 ... 都很麻烦，因为 ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望解决方案
      description: 描述你希望的解决方案
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 你考虑过哪些其他方案

  - type: dropdown
    id: priority
    attributes:
      label: 优先级（个人评估）
      options:
        - 低 — 有了更好，没有也能接受
        - 中 — 会明显改善工作流
        - 高 — 阻碍了我的核心使用场景
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 额外上下文
      description: 任何其他背景信息、截图或使用场景
