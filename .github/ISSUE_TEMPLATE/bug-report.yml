name: Bug Report
description: 报告一个 bug 帮助我们改进
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提交 bug 报告！请尽量填写完整信息以便我们快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰简洁地描述这个 bug 是什么
      placeholder: 描述发生了什么...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现该问题
      placeholder: |
        1. 执行命令 `cord ...`
        2. 查看输出 ...
        3. 出现错误 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 描述你期望发生什么
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 描述实际发生了什么，包括错误信息或日志
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js 版本
      placeholder: "例如: v20.11.0"
    validations:
      required: true

  - type: input
    id: cord-version
    attributes:
      label: cord 版本
      placeholder: "例如: 0.1.0"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 额外上下文
      description: 其他可能有用的信息（截图、配置文件等）
