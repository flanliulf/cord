name: Cross-Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Windows requires node-gyp for native addons (better-sqlite3)
      - name: Install Python (Windows only)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: npm ci

      - name: Build native addon (better-sqlite3 smoke test)
        run: node -e "const db = require('better-sqlite3'); console.log('better-sqlite3 loaded on ${{ matrix.os }}')"
        shell: bash

      - name: Run tests
        run: npm test
